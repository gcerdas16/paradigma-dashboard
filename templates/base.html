<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradigma — {% block title %}Dashboard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-2: #1c2129;
            --border: #30363d;
            --text: #c9d1d9;
            --text-bright: #f0f6fc;
            --text-dim: #6e7681;
            --accent: #58a6ff;
            --accent-dim: rgba(88,166,255,0.1);
            --green: #3fb950;
            --green-dim: rgba(63,185,80,0.1);
            --red: #f85149;
            --red-dim: rgba(248,81,73,0.1);
            --yellow: #d29922;
            --yellow-dim: rgba(210,153,34,0.1);
            --purple: #bc8cff;
            --purple-dim: rgba(188,140,255,0.1);
            --orange: #f0883e;
            --radius: 8px;
            --font: 'Outfit', sans-serif;
            --mono: 'Fira Code', monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }
        .wrap { max-width:1320px; margin:0 auto; padding:20px 16px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; padding:12px 0 0; }
        .brand { display:flex; align-items:center; gap:10px; }
        .brand-mark { width:28px; height:28px; border:2px solid var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; }
        .brand-mark i { font-size:14px; color:var(--accent); }
        .brand h1 { font-size:18px; font-weight:600; color:var(--text-bright); letter-spacing:-0.3px; }
        .brand span { font-size:12px; color:var(--text-dim); margin-left:6px; font-weight:400; }
        .top-right { display:flex; align-items:center; gap:12px; }
        .chip { font-size:11px; font-weight:500; padding:4px 10px; border-radius:12px; border:1px solid; }
        .chip-paper { border-color:var(--yellow); color:var(--yellow); background:var(--yellow-dim); }
        .chip-live { border-color:var(--green); color:var(--green); background:var(--green-dim); }
        .time-tag { font-family:var(--mono); font-size:12px; color:var(--text-dim); }

        /* Navigation tabs */
        .nav-tabs { display:flex; gap:0; margin:16px 0 24px; border-bottom:1px solid var(--border); overflow-x:auto; }
        .nav-tab { padding:10px 18px; font-size:13px; font-weight:500; color:var(--text-dim); text-decoration:none; border-bottom:2px solid transparent; transition:color .2s, border-color .2s; white-space:nowrap; display:flex; align-items:center; gap:6px; }
        .nav-tab:hover { color:var(--text); }
        .nav-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
        .nav-tab i { font-size:15px; }

        .num-strip { display:flex; gap:0; margin-bottom:20px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
        .num-cell { flex:1; padding:20px 16px; border-right:1px solid var(--border); text-align:center; }
        .num-cell:last-child { border-right:none; }
        .num-cell .n-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); font-weight:500; margin-bottom:6px; }
        .num-cell .n-val { font-size:28px; font-weight:700; font-family:var(--mono); letter-spacing:-1px; }
        .num-cell .n-sub { font-size:11px; color:var(--text-dim); margin-top:4px; font-family:var(--mono); }
        .c-accent { color:var(--accent); }
        .c-green { color:var(--green); }
        .c-red { color:var(--red); }
        .c-yellow { color:var(--yellow); }
        .c-purple { color:var(--purple); }
        .c-dim { color:var(--text-dim); }

        .metrics-row { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:20px; }
        .metric-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; }
        .metric-box .m-label { font-size:10px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-dim); margin-bottom:4px; }
        .metric-box .m-val { font-size:18px; font-weight:600; font-family:var(--mono); }
        .metric-box .m-sub { font-size:11px; color:var(--text-dim); margin-top:2px; }

        .prog-bar-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; margin-bottom:20px; display:flex; align-items:center; gap:14px; }
        .prog-label { font-size:12px; color:var(--text-dim); white-space:nowrap; display:flex; align-items:center; gap:6px; }
        .prog-label i { font-size:14px; color:var(--yellow); }
        .prog-track { flex:1; height:4px; background:var(--surface-2); border-radius:2px; overflow:hidden; }
        .prog-fill { height:100%; border-radius:2px; }
        .prog-num { font-family:var(--mono); font-size:12px; color:var(--text-dim); white-space:nowrap; }

        .cols { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
        .panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
        .panel h3 { font-size:12px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-dim); font-weight:500; margin-bottom:12px; }
        .row-item { display:flex; align-items:center; gap:8px; padding:5px 0; }
        .row-item .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
        .row-item .r-name { font-size:13px; width:90px; flex-shrink:0; }
        .row-item .r-bar { flex:1; height:3px; background:var(--surface-2); border-radius:2px; overflow:hidden; }
        .row-item .r-bar-fill { height:100%; border-radius:2px; }
        .row-item .r-num { font-family:var(--mono); font-size:13px; font-weight:500; width:30px; text-align:right; flex-shrink:0; }

        .section-head { font-size:14px; font-weight:600; color:var(--text-bright); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
        .section-head i { font-size:16px; color:var(--accent); }
        .section-head .count { font-family:var(--mono); font-size:12px; color:var(--text-dim); font-weight:400; margin-left:4px; }

        .day-group { margin-bottom:16px; }
        .day-header { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; user-select:none; transition:border-radius .2s; }
        .day-header.open { border-radius:var(--radius) var(--radius) 0 0; }
        .day-header:hover { background:var(--surface-2); }
        .dot-today { background:var(--green); }
        .dot-week { background:var(--accent); }
        .dot-later { background:var(--text-dim); }
        .day-label { font-size:13px; font-weight:600; color:var(--text-bright); }
        .day-date { font-family:var(--mono); font-size:12px; color:var(--text-dim); }
        .day-count { font-family:var(--mono); font-size:11px; color:var(--accent); margin-left:auto; }
        .day-stake { font-family:var(--mono); font-size:11px; color:var(--text-dim); }
        .chevron { transition:transform .25s; color:var(--text-dim); font-size:16px; margin-left:6px; }
        .chevron.open { transform:rotate(90deg); }

        .day-cards { background:var(--surface); border:1px solid var(--border); border-top:none; border-radius:0 0 var(--radius) var(--radius); padding:12px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:10px; overflow:hidden; max-height:2000px; transition:max-height .35s ease,padding .35s ease,opacity .25s ease; opacity:1; }
        .day-cards.collapsed { max-height:0; padding:0 12px; opacity:0; border-color:transparent; }

        .card { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:14px; display:flex; flex-direction:column; gap:8px; }
        .card-top { display:flex; justify-content:space-between; align-items:center; }
        .card-header-row { display:flex; justify-content:space-between; align-items:center; }
        .teams { font-size:14px; font-weight:600; color:var(--text-bright); }
        .teams span { color:var(--text-dim); font-weight:400; font-size:12px; margin:0 4px; }
        .tag { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:2px 8px; border-radius:4px; font-weight:500; }
        .tag-fut { background:var(--green-dim); color:var(--green); }
        .tag-bsk { background:var(--purple-dim); color:var(--purple); }
        .tag-pend { background:var(--surface); color:var(--text-dim); border:1px solid var(--border); }
        .tag-win { background:var(--green-dim); color:var(--green); }
        .tag-loss { background:var(--red-dim); color:var(--red); }
        .tag-push { background:var(--yellow-dim); color:var(--yellow); }
        .eta { font-family:var(--mono); font-size:12px; color:var(--yellow); }
        .eta-soon { color:var(--red) !important; }
        .event-time { font-family:var(--mono); font-size:11px; color:var(--text-dim); }
        .card-divider { height:1px; background:var(--border); }
        .bet-line { font-size:13px; font-weight:500; color:var(--text-bright); }
        .card-row { display:flex; justify-content:space-between; align-items:center; font-size:12px; }
        .card-row .label { color:var(--text-dim); }
        .card-row .val { font-family:var(--mono); font-weight:500; }
        .potential { background:var(--green-dim); border-radius:6px; padding:8px 12px; display:flex; justify-content:space-between; align-items:center; font-size:12px; }
        .potential .label { color:var(--green); font-weight:500; }
        .potential .val { font-family:var(--mono); font-weight:700; font-size:14px; color:var(--green); }
        .info-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:15px; padding:2px; display:flex; align-items:center; opacity:.6; transition:opacity .2s; }
        .info-btn:hover { opacity:1; }

        .tbl-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
        .tbl-scroll { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:12px; }
        thead { background:var(--surface-2); }
        th { padding:10px 12px; text-align:left; font-size:10px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.7px; white-space:nowrap; }
        td { padding:10px 12px; border-top:1px solid var(--border); white-space:nowrap; }
        tr:hover { background:rgba(88,166,255,0.04); }
        .mono { font-family:var(--mono); }
        .dim { color:var(--text-dim); }
        .pnl-pos { color:var(--green); }
        .pnl-neg { color:var(--red); }

        .empty { text-align:center; padding:50px 20px; color:var(--text-dim); }
        .empty i { font-size:36px; margin-bottom:10px; display:block; }

        /* Exposure page specific */
        .exp-section { margin-bottom:24px; }
        .exp-title { font-size:16px; font-weight:700; color:var(--text-bright); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
        .exp-title i { font-size:18px; }
        .exp-bar { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:10px; }
        .exp-bar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .exp-bar-label { font-size:13px; font-weight:500; color:var(--text); }
        .exp-bar-nums { font-family:var(--mono); font-size:13px; font-weight:600; }
        .exp-track { width:100%; height:8px; background:var(--surface-2); border-radius:4px; overflow:hidden; }
        .exp-fill { height:100%; border-radius:4px; transition:width .5s ease; }
        .exp-fill-green { background:var(--green); }
        .exp-fill-yellow { background:var(--yellow); }
        .exp-fill-red { background:var(--red); }
        .exp-fill-accent { background:var(--accent); }

        .status-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; }
        .status-ok { background:var(--green-dim); color:var(--green); border:1px solid rgba(63,185,80,0.3); }
        .status-warn { background:var(--yellow-dim); color:var(--yellow); border:1px solid rgba(210,153,34,0.3); }
        .status-danger { background:var(--red-dim); color:var(--red); border:1px solid rgba(248,81,73,0.3); }

        .today-list { margin-top:12px; }
        .today-item { display:flex; align-items:center; gap:10px; padding:8px 12px; border-bottom:1px solid var(--border); font-size:12px; }
        .today-item:last-child { border-bottom:none; }
        .today-type { font-size:10px; padding:2px 8px; border-radius:4px; font-weight:600; text-transform:uppercase; }
        .today-type-value { background:var(--green-dim); color:var(--green); }
        .today-type-arb { background:var(--accent-dim); color:var(--accent); }

        @media(max-width:900px) {
            .num-strip { flex-wrap:wrap; }
            .num-cell { flex:none; width:50%; }
            .metrics-row { grid-template-columns:repeat(2,1fr); }
            .cols { grid-template-columns:1fr; }
            .nav-tabs { gap:0; }
        }
        @media(max-width:500px) {
            .num-cell { width:100%; border-right:none; border-bottom:1px solid var(--border); }
            .num-cell:last-child { border-bottom:none; }
            .metrics-row { grid-template-columns:1fr; }
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
<div class="wrap">

    <div class="top-bar">
        <div class="brand">
            <div class="brand-mark"><i class="ph-bold ph-chart-line-up"></i></div>
            <h1>Paradigma <span>v1.0</span></h1>
        </div>
        <div class="top-right">
            <span class="chip chip-paper">paper</span>
            <span class="time-tag">{{ now }} CR</span>
        </div>
    </div>

    <nav class="nav-tabs">
        <a href="/" class="nav-tab {% if active_tab == 'value' %}active{% endif %}">
            <i class="ph-bold ph-chart-line-up"></i> Value Bets
        </a>
        <a href="/arbitrage" class="nav-tab {% if active_tab == 'arb' %}active{% endif %}">
            <i class="ph-bold ph-scales"></i> Arbitraje
        </a>
        <a href="/exposure" class="nav-tab {% if active_tab == 'exposure' %}active{% endif %}">
            <i class="ph-bold ph-shield-check"></i> Exposición
        </a>
        <a href="/api" class="nav-tab {% if active_tab == 'api' %}active{% endif %}">
            <i class="ph-bold ph-coins"></i> API & Tokens
        </a>
        <a href="/events" class="nav-tab {% if active_tab == 'events' %}active{% endif %}">
            <i class="ph-bold ph-calendar-blank"></i> Eventos
        </a>
    </nav>

    {% block content %}{% endblock %}

</div>

<script>
    setTimeout(() => location.reload(), 5 * 60 * 1000);

    function toggleDay(header) {
        const cards = header.nextElementSibling;
        const chevron = header.querySelector('.chevron');
        cards.classList.toggle('collapsed');
        header.classList.toggle('open');
        chevron.classList.toggle('open');
    }
    function openTooltip() { document.getElementById('tooltip').classList.add('show'); }
    function closeTooltip() { document.getElementById('tooltip').classList.remove('show'); }
    {% block extra_js %}{% endblock %}
</script>

</body>
</html>
